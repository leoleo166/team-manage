services:
  app:
    build: .
    container_name: team-manage-app
    ports:
      - "${APP_PORT:-8008}:${APP_PORT:-8008}"
    volumes:
      - team-manage-data:/app/data
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/team_manage.db

volumes:
  team-manage-data:
    name: team-manage-data
